# ============================================================
# netlify.toml – TSF27 Teaching Service Commission Portal
# ============================================================

[build]
  publish = "."
  command = "echo 'Static site — no build step'"

# ── SPA Redirects ──────────────────────────────────────────
[[redirects]]
  from   = "/dashboard"
  to     = "/dashboard.html"
  status = 200

[[redirects]]
  from   = "/form27"
  to     = "/form27.html"
  status = 200

[[redirects]]
  from   = "/register"
  to     = "/register.html"
  status = 200

[[redirects]]
  from   = "/admin"
  to     = "/admin.html"
  status = 200

# ── Security Headers ──────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options          = "DENY"
    X-XSS-Protection         = "1; mode=block"
    X-Content-Type-Options   = "nosniff"
    Referrer-Policy          = "strict-origin-when-cross-origin"
    Permissions-Policy       = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy  = "default-src 'self' https://*.supabase.co https://cdn.jsdelivr.net https://fonts.googleapis.com https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;"

# ── Cache static assets ───────────────────────────────────
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
